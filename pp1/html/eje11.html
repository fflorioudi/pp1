<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formulario de registro - Mi web</title>
</head>
<body>
    <h1>Formulario de Registro</h1>    
    <form action="" method="get">
        Nombre:
        <input name="nombre" type="text" size="40" maxlength="50">
        <br>
        <br>
        Apellido:
        <input name="Apellido" type="text" size="40" maxlength="50">
        <br>
        <br>
        Sexo:
            <input name="Sexo" type="radio"> Masculino
            <input type="radio" name="Sexo">Femenino
            <input type="radio" name="Sexo">No Binario

        <br>
        <br>
        Estados Civil:
        <select name="ecevil" id="ecevil">
             <option value="S">Soltero</option>
            <option value="C">Casado</option>
            <option value="D">Divorciado</option>
        </select>
        <br>
        <br>
        <input type="checkbox" checked> Deseo recibir información sobre novedades y ofertas
        <br>
        <br>
        <input type="checkbox">Declaro haber leido y aceptar las condiciones generales del programa y la normativa sobre protección de datos
        <br>
        <br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
